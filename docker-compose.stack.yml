# Docker Compose file with required services for local development, excluding the main application service.
name: booklet-stack

services:
  postgres:
    image: postgres:15
    env_file:
      .env
    ports:
      - "5432:5432"
    volumes:
      - booklet-db:/var/lib/postgresql

  pgadmin4:
    image: dpage/pgadmin4
    env_file:
      .env
    ports:
      - "5050:80"

  redis:
    image: redis/redis-stack:latest
    container_name: redis-stack
    ports:
      - "6379:6379"
      - "8001:8001"

volumes:
    booklet-db:
